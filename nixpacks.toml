# Chordis Music AI - Railway Deployment Config
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    ". /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt"
]

[variables]
PATH = "/opt/venv/bin:${PATH}"

[start]
cmd = "/opt/venv/bin/gunicorn api:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

